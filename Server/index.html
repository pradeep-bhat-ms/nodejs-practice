<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
        }

        .hero{
            height:100vh;
            background:linear-gradient(to right, #4facfe, #00f2fe);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
        }

        h1{
            font-size:50px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            margin-bottom:30px;
        }

        .btn{
            padding:12px 25px;
            background:white;
            color:#0077ff;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .btn:hover{
            background:#f0f0f0;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>Learn Web Development with Simple Projects</p>
        <a href="#" class="btn">Get Started</a>
    </section>

</body>
</html>
